name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Lint with ruff (Python 3.9+)
      if: matrix.python-version != '3.8'
      run: |
        pip install ruff
        ruff check src/ tests/
      continue-on-error: true
    
    - name: Run tests
      run: |
        pytest --cov=aly --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: true

  integration:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Install ALY
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    
    - name: Test init command
      run: |
        aly init test-project --template soc
        cd test-project
        ls -la
        test -d .aly
        test -d rtl
        test -d firmware
        test -d verification
    
    - name: Test info command
      run: |
        cd test-project
        aly info
    
    - name: Test clean command
      run: |
        cd test-project
        mkdir -p .aly_build/test
        aly clean
        test ! -d .aly_build
